<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
    <title>The Gambia Academy Request| Portal</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F5D4A">

    <style>
        :root {
            --green: #0F5D4A;
            --gold: #020742;
            --cream: #FAF7F2;
            --dark: #1F1F1F;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui;
        }

        body {
            background: var(--cream);
            color: var(--dark);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--green), #4f005f);
            color: #fff;
            padding: 40px 20px 60px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--gold);
        }

        .header img {
            width: 90px;
            margin-bottom: 10px;
        }

        /* MAIN */
        .main {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .portal-grid {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
            gap: 22px;
            justify-content: center;
        }

        /* CARD */
        .portal-card {
            background: #f9ffff;
            border-radius: 14px;
            padding: 26px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--dark);
            box-shadow: 0 10px 24px rgb(1, 14, 6);
            transition: .3s ease;
            cursor: pointer;
            position: relative;
        }

        .portal-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 5px;
            width: 100%;
            border-radius: 14px 14px 0 0;
            background: var(--green);
        }

        .portal-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 35px rgba(33, 4, 4, 0.12);
        }

        /* ICON */
        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            fill: currentColor;
        }

        /* SPECIFIC COLORS */
/* SPECIFIC COLORS */

        .transport::before {
            color: #011ce8;
        }

        .transport::before {
            background: #3b0244;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 25px 10px;
            font-size: .8rem;
            color: #000000;
        }
    </style>
</head>

<body>

    <header class="header">
        <img src="logo.png" alt="The Gambia Academy">
        <h1>The Gambia Academy Transport & Logistics</h1>
        <p>Learning with Purpose • Leading with Integrity</p>
        <p>Students safety is our priority.</p>
        <p>Everyone knows that our driver is a special person.</p>
    </header>

    <main class="main">
        <section class="portal-grid">

            <!-- SCHEDULES -->
        <div class="portal-card transport" 
             onclick="window.location.href='transport-logistics.html'">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M4 16c0 .9.7 2 2 2s2-1.1 2-2-1-2-2-2-2 1.1-2 2zm12 0c0 .9.7 2 2 2s2-1.1 2-2-1-2-2-2-2 1.1-2 2zM5 11h14V6c0-1.1-.9-2-2-2H7C5.9 4 5 4.9 5 6v5z" />
                </svg>
            </div>
                <h3>THE TRANSPORT MANAGEMENT SYSTEM</h3>
                <p>Open the Transport & Logistics Dashboard</p>
            </a>
        </section>
    </main>

<footer class="footer">
    <div>       
        Powered by JangAfrica<br>
        © <span id="year"></span> The Gambia Academy
    </div>
</footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <!-- SERVICE WORKER -->
    <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
    </script>
    <script>
    (function () {
        const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
        const isInStandaloneMode = ('standalone' in window.navigator) && window.navigator.standalone;
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    
        if (!isIOS || isInStandaloneMode || !isSafari) return;
    
        if (localStorage.getItem("iosInstallDismissed")) return;
    
        const banner = document.createElement("div");
        banner.id = "ios-install-banner";
        banner.innerHTML = `
            <div style="
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                max-width: 420px;
                background: #1e293b;
                color: white;
                padding: 16px 20px;
                border-radius: 14px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                font-family: -apple-system, BlinkMacSystemFont, sans-serif;
                z-index: 9999;
                animation: slideUp 0.4s ease;
            ">
                <div style="font-size: 15px; margin-bottom: 8px;">
                    📲 Install this app on your iPhone:
                </div>
                <div style="font-size: 14px; opacity: 0.85;">
                    Tap <strong>Share</strong> <span style="font-size:18px;">⬆️</span> 
                    then <strong>"Add to Home Screen"</strong>.
                </div>
                <button id="ios-install-close" style="
                    margin-top: 12px;
                    background: transparent;
                    border: none;
                    color: #38bdf8;
                    font-size: 14px;
                    cursor: pointer;
                ">
                    Dismiss
                </button>
            </div>
            <style>
                @keyframes slideUp {
                    from { transform: translate(-50%, 20px); opacity: 0; }
                    to { transform: translate(-50%, 0); opacity: 1; }
                }
            </style>
        `;
    
        document.body.appendChild(banner);
    
        document.getElementById("ios-install-close").addEventListener("click", function () {
            banner.remove();
            localStorage.setItem("iosInstallDismissed", "true");
        });
    })();
    </script>
</body>

</html>
